<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>1DAY 3D-DAY1 Metatron cube</title>
    

  </head>
    
  <body>
  <style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  overflow:hidden;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
canvas { display:block; }
.title {
  position:fixed;
  top:43px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(14px,2.2vw,26px);
  letter-spacing:6px;
  color:#c084fc;
  text-shadow:0 0 16px rgba(192,132,252,0.9),0 0 40px rgba(168,85,247,0.4);
  white-space:nowrap;
  pointer-events:none;
  text-align:center;
}
.hint {
  position:fixed;
  top:14px;
  right:16px;
  font-family:monospace;
  font-size:10px;
  letter-spacing:2px;
  color:rgba(168,85,247,0.35);
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&display=swap" rel="stylesheet">
<div class="hint">DRAG · ROTATE</div>
<div class="title">METATRON'S CUBE</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const W = innerWidth, H = innerHeight;
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(40, W/H, 0.1, 200);
camera.position.set(0, 0, 22);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 1);
document.body.appendChild(renderer.domElement);

// ── Lighting ──────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x9333ea, 0.6);
scene.add(ambient);
const point1 = new THREE.PointLight(0xc084fc, 2.5, 30);
point1.position.set(5, 5, 8);
scene.add(point1);
const point2 = new THREE.PointLight(0x7c3aed, 1.5, 30);
point2.position.set(-5, -5, -8);
scene.add(point2);
const point3 = new THREE.PointLight(0xe879f9, 1.0, 20);
point3.position.set(0, 8, 0);
scene.add(point3);

// ── 13 sphere positions (cuboctahedron) ───────────────────
const A = Math.SQRT2; // ~1.4142, so neighbor distance = 2*R when R=1
const NODES = [
  [0,0,0],
  // permutations of (±A, ±A, 0)
  [ A, A, 0],[ A,-A, 0],[-A, A, 0],[-A,-A, 0],
  [ A, 0, A],[ A, 0,-A],[-A, 0, A],[-A, 0,-A],
  [ 0, A, A],[ 0, A,-A],[ 0,-A, A],[ 0,-A,-A],
];

// ── Root group ────────────────────────────────────────────
const root = new THREE.Group();
// Tilt so we see 3D structure better (view from ~[1,1,1] direction)
root.rotation.x = 0.45;
root.rotation.y = 0.60;
scene.add(root);

// ── Glass sphere geometry (layered) ───────────────────────
const SPHERE_R = 0.88;

const spheres = [];
NODES.forEach(([x,y,z], idx) => {
  const isCenter = idx === 0;
  const grp = new THREE.Group();
  grp.position.set(x, y, z);

  // Layer 1: Glass shell (transparent)
  const geoShell = new THREE.SphereGeometry(SPHERE_R, 48, 48);
  const matShell = new THREE.MeshPhongMaterial({
    color:       0xc084fc,
    emissive:    0x4c1d95,
    emissiveIntensity: 0.35,
    transparent: true,
    opacity:     0.13,
    side:        THREE.DoubleSide,
    shininess:   120,
    specular:    0xffffff,
    depthWrite:  false,
  });
  grp.add(new THREE.Mesh(geoShell, matShell));

  // Layer 2: Wireframe outline
  const geoWire = new THREE.SphereGeometry(SPHERE_R, 16, 16);
  const matWire = new THREE.MeshBasicMaterial({
    color:       0xa855f7,
    wireframe:   true,
    transparent: true,
    opacity:     0.14,
    blending:    THREE.AdditiveBlending,
    depthWrite:  false,
  });
  grp.add(new THREE.Mesh(geoWire, matWire));

  // Layer 3: Inner glow core
  const geoCore = new THREE.SphereGeometry(SPHERE_R * 0.10, 24, 24);
  const matCore = new THREE.MeshBasicMaterial({
    color:       0xe9d5ff,
    transparent: true,
    opacity:     0.75,
    blending:    THREE.AdditiveBlending,
    depthWrite:  false,
  });
  grp.add(new THREE.Mesh(geoCore, matCore));

  // Layer 4: Inner bloom
  const geoBloom = new THREE.SphereGeometry(SPHERE_R * 0.22, 24, 24);
  const matBloom = new THREE.MeshBasicMaterial({
    color:       0x9333ea,
    transparent: true,
    opacity:     0.22,
    blending:    THREE.AdditiveBlending,
    depthWrite:  false,
  });
  grp.add(new THREE.Mesh(geoBloom, matBloom));

  // Layer 5: Outer halo
  const geoHalo = new THREE.SphereGeometry(SPHERE_R * 1.18, 24, 24);
  const matHalo = new THREE.MeshBasicMaterial({
    color:       0x7c3aed,
    transparent: true,
    opacity:     0.06,
    blending:    THREE.AdditiveBlending,
    depthWrite:  false,
    side:        THREE.BackSide,
  });
  grp.add(new THREE.Mesh(geoHalo, matHalo));

  root.add(grp);
  spheres.push({ grp, matShell, matWire, matCore, matBloom, matHalo });
});

// ── Connecting lines (all 78 pairs) ──────────────────────
const linesGroup = new THREE.Group();
root.add(linesGroup);

// Line materials by distance
const matClose = new THREE.LineBasicMaterial({
  color: 0xc084fc, transparent:true, opacity:0.5,
  blending:THREE.AdditiveBlending, depthWrite:false,
});
const matFar = new THREE.LineBasicMaterial({
  color: 0x7c3aed, transparent:true, opacity:0.18,
  blending:THREE.AdditiveBlending, depthWrite:false,
});
const matCenter = new THREE.LineBasicMaterial({
  color: 0xe879f9, transparent:true, opacity:0.55,
  blending:THREE.AdditiveBlending, depthWrite:false,
});

for (let i = 0; i < NODES.length; i++) {
  for (let j = i+1; j < NODES.length; j++) {
    const [x1,y1,z1] = NODES[i];
    const [x2,y2,z2] = NODES[j];
    const dx=x2-x1, dy=y2-y1, dz=z2-z1;
    const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);

    const pts = [
      new THREE.Vector3(x1,y1,z1),
      new THREE.Vector3(x2,y2,z2),
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    // Choose mat: center connections brighter, touching spheres medium, far ones dim
    const mat = (i===0||j===0) ? matCenter
              : dist < 2.1     ? matClose
              :                  matFar;
    linesGroup.add(new THREE.Line(geo, mat));
  }
}

// ── Stars ─────────────────────────────────────────────────
const starPts = [];
for (let i = 0; i < 1200; i++) {
  starPts.push(
    (Math.random()-0.5)*120,
    (Math.random()-0.5)*120,
    (Math.random()-0.5)*120
  );
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
  color:0xd8b4fe, size:0.06, transparent:true, opacity:0.55,
  blending:THREE.AdditiveBlending,
})));

// ── Drag interaction ──────────────────────────────────────
let drag=false, px=0, py=0, vx=0, vy=0;
const el = renderer.domElement;
el.addEventListener('mousedown',  e=>{drag=true;  px=e.clientX; py=e.clientY; vx=vy=0;});
el.addEventListener('touchstart', e=>{drag=true;  px=e.touches[0].clientX; py=e.touches[0].clientY;},{passive:true});
window.addEventListener('mouseup',   ()=>drag=false);
window.addEventListener('touchend',  ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag)return;
  vx=(e.clientX-px)*0.009; vy=(e.clientY-py)*0.009;
  root.rotation.y+=vx; root.rotation.x+=vy;
  px=e.clientX; py=e.clientY;
});
el.addEventListener('touchmove', e=>{
  if(!drag)return;
  vx=(e.touches[0].clientX-px)*0.009; vy=(e.touches[0].clientY-py)*0.009;
  root.rotation.y+=vx; root.rotation.x+=vy;
  px=e.touches[0].clientX; py=e.touches[0].clientY;
},{passive:true});

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── ベース値 ─────────────────────────────────────────────
const BASE = {
  core:  0.75, bloom: 0.22, halo:  0.06,
  shell: 0.13, wire:  0.14,
  close: 0.50, center:0.55, far:   0.18,
};
const PEAK = {
  core:  1.00, bloom: 0.70, halo:  0.30,
  shell: 0.55, wire:  0.55,
  close: 0.90, center:0.95, far:   0.55,
};

// ── 呼吸シーケンス ────────────────────────────────────────
// 各フェーズ: [duration秒, coreF, lineF, sphereF]
// 0=base, 1=peak の間で補間
const SEQ = [
  { dur:4, core:0,   line:0,   sph:0   }, // 待機
  { dur:4, core:1,   line:0,   sph:0   }, // コア明るく
  { dur:4, core:1,   line:1,   sph:0   }, // コア+ライン
  { dur:8, core:1,   line:1,   sph:1   }, // コア+ライン+球
  { dur:4, core:1,   line:1,   sph:1   }, // 全体明るく維持
  { dur:4, core:1,   line:1,   sph:0   }, // 球が戻る
  { dur:4, core:1,   line:0,   sph:0   }, // ラインが戻る
  { dur:8, core:0,   line:0,   sph:0   }, // コアが戻る
];
const TOTAL = SEQ.reduce((s,p)=>s+p.dur, 0); // 40秒

function lerp(a, b, f) { return a + (b - a) * f; }

function smoothstep(e0, e1, x) {
  const t = Math.max(0, Math.min(1, (x-e0)/(e1-e0)));
  return t*t*(3-2*t);
}

function getBreath(elapsed) {
  const cycleTime = elapsed % TOTAL;
  let acc = 0;
  for (let i = 0; i < SEQ.length; i++) {
    const ph = SEQ[i];
    if (cycleTime < acc + ph.dur) {
      // フェーズ内の進行度 (0→1)
      const f = (cycleTime - acc) / ph.dur;
      // 前フェーズの値
      const prev = SEQ[(i-1+SEQ.length)%SEQ.length];
      return {
        core: smoothstep(0,1, lerp(prev.core, ph.core, f)),
        line: smoothstep(0,1, lerp(prev.line, ph.line, f)),
        sph:  smoothstep(0,1, lerp(prev.sph,  ph.sph,  f)),
      };
    }
    acc += ph.dur;
  }
  return { core:0, line:0, sph:0 };
}

// ── Animate ───────────────────────────────────────────────
let t = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  t += 0.004;

  if (!drag) {
    root.rotation.y += 0.0028;
    root.rotation.x += 0.0010;
    vx=vy=0;
  } else {
    vx*=0.90; vy*=0.90;
    root.rotation.y+=vx; root.rotation.x+=vy;
  }

  // 呼吸値を取得
  const br = getBreath(elapsed);

  // ── 各球のマテリアルを更新 ──
  spheres.forEach(({ matCore, matBloom, matHalo, matShell, matWire }) => {
    matCore.opacity  = lerp(BASE.core,  PEAK.core,  br.core);
    matBloom.opacity = lerp(BASE.bloom, PEAK.bloom, br.core);
    matHalo.opacity  = lerp(BASE.halo,  PEAK.halo,  br.sph);
    matShell.opacity = lerp(BASE.shell, PEAK.shell, br.sph);
    matWire.opacity  = lerp(BASE.wire,  PEAK.wire,  br.sph);
  });

  // ── ラインを更新 ──
  matClose.opacity  = lerp(BASE.close,  PEAK.close,  br.line);
  matCenter.opacity = lerp(BASE.center, PEAK.center, br.line);
  matFar.opacity    = lerp(BASE.far,    PEAK.far,    br.line);

  // ── ライト軌道 ──
  point1.position.set(
    6*Math.cos(t*0.4), 4*Math.sin(t*0.3), 8*Math.cos(t*0.25)
  );
  point2.position.set(
    -5*Math.cos(t*0.35), -4*Math.sin(t*0.28), -7*Math.sin(t*0.3)
  );

  renderer.render(scene, camera);
}
animate();
</script>
    
  </body>
  
</html>
